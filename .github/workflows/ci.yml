name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  go-backend:
    name: Go Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: smartcharge-api

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: smartcharge-api/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      # Tests will be added when Phase 8 (Testing) is implemented
      # - name: Test
      #   run: go test -v -race ./...

  nextjs-frontend:
    name: Next.js Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # API URL not needed at build time -- rewrites are runtime config
          NEXT_PUBLIC_API_URL: http://localhost:8080

  docker-build:
    name: Docker Build (API)
    runs-on: ubuntu-latest
    needs: go-backend

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t smartcharge-api:ci ./smartcharge-api

      - name: Verify health check endpoint exists
        run: |
          docker run -d --name test-api \
            -e DATABASE_URL=postgres://test:test@localhost:5432/test \
            -e JWT_SECRET=ci-test-secret \
            -e PORT=8080 \
            -e GIN_MODE=debug \
            -p 8080:8080 \
            smartcharge-api:ci || true
          sleep 2
          docker logs test-api 2>&1 || true
          docker rm -f test-api || true
